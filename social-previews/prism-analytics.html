<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Analytics - Social Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1280px;
            height: 640px;
            background: linear-gradient(135deg, #0D1117 0%, #161B22 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 60px;
        }
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 56px;
            color: #FFFFFF;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        h2 {
            font-size: 28px;
            color: #8B949E;
            font-weight: 400;
            margin-bottom: 40px;
        }
        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
        }
        .tech-item {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            color: #58A6FF;
            font-size: 18px;
            font-weight: 500;
        }
        .tagline {
            color: #3FB950;
            font-size: 22px;
            font-weight: 500;
        }
        .corner-decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(88, 166, 255, 0.2);
        }
        .top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
        }
        .top-right {
            top: 40px;
            right: 40px;
            border-left: none;
            border-bottom: none;
        }
        .bottom-left {
            bottom: 40px;
            left: 40px;
            border-right: none;
            border-top: none;
        }
        .bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>
    
    <div class="container">
        <div class="logo">🔮</div>
        <h1>Prism Analytics</h1>
        <h2>AI-Powered Manufacturing Analytics</h2>
        <div class="tech-stack">
            <span class="tech-item">Python</span>
            <span class="tech-item">OpenAI</span>
            <span class="tech-item">PostgreSQL</span>
            <span class="tech-item">FastAPI</span>
        </div>
        <div class="tagline">From Data to Decisions</div>
    </div>
</body>
</html>
