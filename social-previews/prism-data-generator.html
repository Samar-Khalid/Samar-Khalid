<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Data Generator - Social Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1280px;
            height: 640px;
            background: linear-gradient(135deg, #0D1117 0%, #161B22 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 60px;
        }
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 52px;
            color: #FFFFFF;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        h2 {
            font-size: 28px;
            color: #8B949E;
            font-weight: 400;
            margin-bottom: 40px;
        }
        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
        }
        .tech-item {
            background: rgba(210, 153, 34, 0.1);
            border: 1px solid rgba(210, 153, 34, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            color: #D29922;
            font-size: 18px;
            font-weight: 500;
        }
        .tagline {
            color: #3FB950;
            font-size: 22px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎲</div>
        <h1>Data Generator</h1>
        <h2>Synthetic Manufacturing Data</h2>
        <div class="tech-stack">
            <span class="tech-item">Python</span>
            <span class="tech-item">Faker</span>
            <span class="tech-item">CSV</span>
            <span class="tech-item">JSON</span>
        </div>
        <div class="tagline">Generate Realistic Test Data</div>
    </div>
</body>
</html>
